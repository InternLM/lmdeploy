# HF model id: Qwen/Qwen3.5-397B-A17B-FP8

h:
- model_type:
  - chat
  - vl
  engine_config:
    dp: 4
    ep: 8
    extra:
      max-batch-size: 256
      cache-max-entry-count: 0.9
  backends:
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - evaluate
  - func
  - longtext_benchmark
  - longtext_evaluate
  - mllm_evaluate
  gen_config:
    temperature: 1.0
    top-k: 20
    repetition-penalty: 1.0
    top-p: 0.95
    chat-template-kwargs:
      enable_thinking: true
