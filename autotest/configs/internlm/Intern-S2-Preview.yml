# HF model id: internlm/Intern-S2-Preview

a100:
- model_type:
  - chat
  - vl
  engine_config:
    tp: 2
  backends:
  - name: turbomind
    communicators:
    - nccl
    - cuda-ipc
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - func
  quantization:
    turbomind:
    - kvint8
- model_type:
  - chat
  - vl
  engine_config:
    tp: 2
    extra:
      reasoning-parser: qwen-qwq
      speculative-algorithm: qwen3_5_mtp
      speculative-num-draft-tokens: 4
      max-batch-size: 256
  backends:
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - func
h:
- model_type:
  - chat
  - vl
  engine_config:
    tp: 2
  backends:
  - name: turbomind
    communicators:
    - nccl
    - cuda-ipc
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - evaluate
  - func
  - longtext_benchmark
  - longtext_evaluate
  - mllm_evaluate
  - quantization
  quantization:
    turbomind:
    - awq
    pytorch:
    - fp8
  gen_config:
    temperature: 1.0
    top-k: 20
    repetition-penalty: 1.0
    top-p: 0.95
    chat-template-kwargs:
      enable_thinking: true
- model_type:
  - chat
  - vl
  engine_config:
    tp: 2
    extra:
      reasoning-parser: qwen-qwq
      speculative-algorithm: qwen3_5_mtp
      speculative-num-draft-tokens: 4
      max-batch-size: 256
  backends:
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - mtp_evaluate
  - func
  gen_config:
    temperature: 1.0
    top-k: 20
    repetition-penalty: 1.0
    top-p: 0.95
    chat-template-kwargs:
      enable_thinking: true
