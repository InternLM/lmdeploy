# HF model id: meta-llama/Meta-Llama-3.1-8B-Instruct
a100:
- model_type: chat
  engine_config:
    tp: 1
    extra:
      session-len: 65536
  backends:
  - name: turbomind
    communicators:
    - nccl
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - evaluate
  - func
  - prefix_cache
  - quantization
  quantization:
    turbomind:
    - awq
    - kvint4
    - kvint8
    pytorch:
    - awq
    - kvint4
    - kvint8
    - w8a8
  gen_config:
    temperature: 0.6
h:
- model_type: chat
  engine_config:
    tp: 1
  backends:
  - name: turbomind
    communicators:
    - nccl
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - func
  - prefix_cache
  - quantization
  quantization:
    turbomind:
    - awq
    - kvint4
    - kvint8
    pytorch:
    - awq
    - kvint4
    - kvint8
    - w8a8
- model_type: chat
  engine_config:
    tp: 1
    extra:
      speculative-algorithm: eagle3
      speculative-num-draft-tokens: 3
      speculative-draft-model: yuhuili/EAGLE3-LLaMA3.1-Instruct-8B
      max-batch-size: 128
  backends:
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - func
  - mtp_evaluate
