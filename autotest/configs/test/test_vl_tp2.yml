# HF model id: test/test_vl_tp2

test:
- model_type: chat
  engine_config:
    tp: 2
    extra:
      session-len: 65536
  backends:
  - name: turbomind
    communicators:
    - nccl
    - cuda-ipc
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - evaluate
  - func
  - longtext
  - longtext_benchmark
  - mllm_evaluate
  - prefix_cache
  quantization:
    turbomind:
    - kvint8
    pytorch:
    - kvint4
    - kvint8
  gen_config:
    temperature: 0.6
- model_type: vl
  engine_config:
    tp: 2
    extra:
      session-len: 65536
  backends:
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - benchmark
  - evaluate
  - func
  - longtext
  - longtext_benchmark
  - mllm_evaluate
  quantization:
    pytorch:
    - kvint4
    - kvint8
  gen_config:
    temperature: 0.6
