# HF model id: zai-org/GLM-4.7-Flash

a100:
- model_type: chat
  engine_config:
    tp: 2
  backends:
  - name: turbomind
    communicators:
    - nccl
    - cuda-ipc
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - func
h:
- model_type: chat
  engine_config:
    tp: 2
  backends:
  - name: turbomind
    communicators:
    - nccl
    - cuda-ipc
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - func
- model_type: chat
  engine_config:
    tp: 2
    extra:
      speculative-algorithm: deepseek_mtp
      speculative-num-draft-tokens: 3
      max-batch-size: 128
  backends:
  - name: pytorch
    communicators:
    - nccl
  test_coverage:
  - func
